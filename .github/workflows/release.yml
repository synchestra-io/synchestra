name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/release.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.9.0) — leave empty to build snapshot of current ref'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  goreleaser:
    name: ${{ (startsWith(github.ref, 'refs/tags/') || inputs.tag != '') && 'Publish release' || 'Validate snapshot build' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Run GoReleaser (snapshot — validate only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.tag == '' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          version: ~> v2
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (full release)
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag != '' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to synchestra-releases
        if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          RELEASE_TAG="cli-${TAG}"

          # Generate release notes from merged PRs since previous tag.
          PREV_TAG="$(git tag --sort=-v:refname | grep '^v' | head -1)"
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            NOTES="$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${TAG}" -f previous_tag_name="${PREV_TAG}" \
              --jq '.body' 2>/dev/null || true)"
          fi
          if [ -z "$NOTES" ]; then
            NOTES="$(git log --oneline "${PREV_TAG:+${PREV_TAG}..}HEAD" 2>/dev/null | head -20 || echo 'Synchestra CLI binaries')"
          fi

          gh release create "${RELEASE_TAG}" \
            --repo synchestra-io/synchestra-releases \
            --title "Synchestra CLI ${TAG}" \
            --notes "${NOTES}"

          gh release upload "${RELEASE_TAG}" \
            --repo synchestra-io/synchestra-releases \
            dist/*.tar.gz dist/*.zip dist/checksums.txt ai-plugin.zip

      - name: Upload snapshot artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') && inputs.tag == '' }}
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-binaries
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_checksums.txt
          retention-days: 7
