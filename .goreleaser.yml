version: 2

project_name: synchestra

before:
  hooks:
    - go mod tidy
    - go generate ./...
    # Create a zip archive of the ai-plugin directory to attach to the release.
    # Must be outside dist/ — GoReleaser cleans dist/ after before hooks run.
    - sh -c "cd ai-plugin && zip -r ../ai-plugin.zip . --exclude '*/.DS_Store'"

builds:
  - id: synchestra
    main: .
    binary: synchestra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude windows/arm64 — not yet a common target
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/synchestra-io/synchestra/pkg/cli.version={{.Version}}
      - -X github.com/synchestra-io/synchestra/pkg/cli.commit={{.Commit}}
      - -X github.com/synchestra-io/synchestra/pkg/cli.date={{.Date}}

archives:
  - id: synchestra
    ids:
      - synchestra
    name_template: "synchestra_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  disable: true

changelog:
  disable: true
