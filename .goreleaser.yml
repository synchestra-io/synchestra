version: 2

project_name: synchestra

before:
  hooks:
    - go mod tidy
    - go generate ./...
    # Create a zip archive of the ai-plugin directory to attach to the release.
    # mkdir -p dist first because GoReleaser hasn't created it yet at this stage.
    - sh -c "mkdir -p dist && cd ai-plugin && zip -r ../dist/ai-plugin.zip . --exclude '*/.DS_Store'"

builds:
  - id: synchestra
    main: .
    binary: synchestra
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Exclude windows/arm64 — not yet a common target
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/synchestra-io/synchestra/pkg/cli.version={{.Version}}
      - -X github.com/synchestra-io/synchestra/pkg/cli.commit={{.Commit}}
      - -X github.com/synchestra-io/synchestra/pkg/cli.date={{.Date}}

archives:
  - id: synchestra
    builds:
      - synchestra
    name_template: "synchestra_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    formats: [tar.gz]

checksum:
  name_template: "synchestra_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  # Attach the ai-plugin archive as an extra file on the GitHub release
  extra_files:
    - glob: dist/ai-plugin.zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
